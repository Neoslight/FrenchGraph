<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rap Graph FR — Cartographie des Collaborations du Rap Français</title>
  <meta name="description" content="Explorez le réseau de collaborations du rap français : 9 500+ artistes, 27 000+ connexions. Recherchez des feats, découvrez des liens et des communautés." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Loading screen -->
  <div id="loader">
    <div class="loader-content">
      <h1>RAP GRAPH <span>FR</span></h1>
      <p>Chargement du réseau...</p>
      <div class="loader-spinner"></div>
    </div>
  </div>

  <!-- Top bar -->
  <header id="topbar">
    <div class="topbar-left">
      <button id="btn-communities" class="topbar-btn" title="Communautés">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="5" cy="18" r="2"/><circle cx="19" cy="18" r="2"/><line x1="7" y1="7" x2="10" y2="10"/><line x1="14" y1="10" x2="17" y2="7"/><line x1="7" y1="17" x2="10" y2="14"/><line x1="14" y1="14" x2="17" y2="17"/></svg>
      </button>
      <button id="btn-force" class="topbar-btn" title="Simulation de force">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.78" y2="4.22"/></svg>
      </button>
      <button id="btn-labels" class="topbar-btn topbar-btn--active" title="Afficher/masquer les labels de communautés">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </button>
      <div id="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Rechercher un artiste..." autocomplete="off" />
        <div id="search-results" class="hidden"></div>
      </div>
    </div>
    <div class="topbar-center">
      <h1>RAP GRAPH <span>FR</span></h1>
    </div>
    <div class="topbar-right">
      <button id="btn-path" class="topbar-btn" title="Trouver un chemin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
      </button>
      <button id="btn-stats" class="topbar-btn" title="Statistiques">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="6" width="4" height="15"/><rect x="17" y="2" width="4" height="19"/></svg>
      </button>
    </div>
  </header>

  <!-- Community panel (left) -->
  <aside id="community-panel" class="panel panel-left hidden">
    <div class="panel-header">
      <h2>Communautés</h2>
      <button class="panel-close">&times;</button>
    </div>
    <div class="panel-body" id="community-list"></div>
  </aside>

  <!-- Force simulation panel (left) -->
  <aside id="force-panel" class="panel panel-left hidden" style="top: calc(var(--topbar-height) + 8px); left: calc(var(--topbar-height) + 48px);">
    <div class="panel-header">
      <h2>Simulation</h2>
      <button class="panel-close">&times;</button>
    </div>
    <div class="panel-body">
      <div class="force-toggle-row">
        <label for="force-enabled">Activer la simulation</label>
        <label class="toggle-switch">
          <input type="checkbox" id="force-enabled" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <p class="panel-hint">Tirez un nœud pour le repositionner</p>

      <div class="slider-group">
        <div class="slider-header">
          <label>Répulsion (scaling)</label>
          <span id="fa2-scaling-val">2</span>
        </div>
        <input type="range" id="fa2-scaling" min="0.5" max="20" step="0.5" value="2" />
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <label>Gravité</label>
          <span id="fa2-gravity-val">0.05</span>
        </div>
        <input type="range" id="fa2-gravity" min="0.001" max="0.5" step="0.001" value="0.05" />
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <label>Ralentissement</label>
          <span id="fa2-slowdown-val">1×</span>
        </div>
        <input type="range" id="fa2-slowdown" min="0.5" max="10" step="0.5" value="1" />
      </div>

      <div class="force-toggle-row">
        <label for="fa2-linlog">Mode LinLog (clusters denses)</label>
        <label class="toggle-switch">
          <input type="checkbox" id="fa2-linlog" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="force-toggle-row">
        <label for="fa2-adjust-sizes">Anti-chevauchement</label>
        <label class="toggle-switch">
          <input type="checkbox" id="fa2-adjust-sizes" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="force-actions">
        <button id="force-reheat" class="btn-secondary">Relancer</button>
        <button id="force-reset" class="btn-secondary">Réinitialiser layout</button>
      </div>
    </div>
  </aside>

  <!-- Artist panel (right) -->
  <aside id="artist-panel" class="panel panel-right hidden">
    <div class="panel-header">
      <h2>Artiste</h2>
      <button class="panel-close">&times;</button>
    </div>
    <div class="panel-body" id="artist-content"></div>
  </aside>

  <!-- Path finder modal -->
  <div id="path-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Trouver un chemin</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="path-input-group">
          <label>De</label>
          <input type="text" id="path-from" placeholder="Artiste de départ..." autocomplete="off" />
          <div id="path-from-results" class="path-search-results hidden"></div>
        </div>
        <div class="path-input-group">
          <label>Vers</label>
          <input type="text" id="path-to" placeholder="Artiste d'arrivée..." autocomplete="off" />
          <div id="path-to-results" class="path-search-results hidden"></div>
        </div>
        <button id="path-find-btn" class="btn-primary" disabled>Trouver le chemin</button>
        <div id="path-result" class="hidden"></div>
      </div>
    </div>
  </div>

  <!-- Stats modal -->
  <div id="stats-modal" class="modal hidden">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h2>Statistiques du réseau</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="stats-content"></div>
    </div>
  </div>

  <!-- Timeline -->
  <footer id="timeline-bar">
    <div id="year-histogram"></div>
    <div class="timeline-controls">
      <span id="year-start-label">2000</span>
      <input type="range" id="year-start" min="2000" max="2025" value="2000" />
      <input type="range" id="year-end" min="2000" max="2025" value="2025" />
      <span id="year-end-label">2025</span>
      <button id="btn-play" class="topbar-btn" title="Animer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
    </div>
  </footer>

  <!-- Path strip (shown when path is active) -->
  <div id="path-strip" class="hidden"></div>

  <!-- Graph container -->
  <div id="sigma-container"></div>

  <!-- Tooltip -->
  <div id="tooltip" class="hidden"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
